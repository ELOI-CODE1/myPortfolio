<section id="contact" class="py-32 px-8 transition-colors duration-300"
  [class]="theme.isDark() ? 'bg-gray-950 text-white' : 'bg-white text-gray-900'">

  <div class="max-w-2xl mx-auto text-center">

    <!-- Header -->
    <p class="text-cyan-400 tracking-[0.4em] uppercase text-sm mb-4">Get In Touch</p>
    <h2 class="text-5xl font-black tracking-tighter mb-6">
      Contact <span class="text-cyan-400">Me</span>
    </h2>
    <div class="w-16 h-1 bg-cyan-400 mx-auto mb-8"></div>
    <p class="mb-12"
      [class]="theme.isDark() ? 'text-gray-400' : 'text-gray-500'">
      Have a project in mind or just want to say hi? My inbox is always open!
    </p>

    <!-- Contact cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-12">
      <div class="p-6 border transition-colors duration-300"
        [class]="theme.isDark() ? 'border-gray-700 bg-gray-800' : 'border-gray-200 bg-gray-50'">
        <p class="text-2xl mb-2">📧</p>
        <p class="text-xs tracking-widest uppercase text-cyan-400 mb-1">Email</p>
        <p class="text-sm"
          [class]="theme.isDark() ? 'text-gray-400' : 'text-gray-500'">
          your@email.com
        </p>
      </div>
      <div class="p-6 border transition-colors duration-300"
        [class]="theme.isDark() ? 'border-gray-700 bg-gray-800' : 'border-gray-200 bg-gray-50'">
        <p class="text-2xl mb-2">💼</p>
        <p class="text-xs tracking-widest uppercase text-cyan-400 mb-1">LinkedIn</p>
        <p class="text-sm"
          [class]="theme.isDark() ? 'text-gray-400' : 'text-gray-500'">
          /in/yourname
        </p>
      </div>
      <div class="p-6 border transition-colors duration-300"
        [class]="theme.isDark() ? 'border-gray-700 bg-gray-800' : 'border-gray-200 bg-gray-50'">
        <p class="text-2xl mb-2">🐙</p>
        <p class="text-xs tracking-widest uppercase text-cyan-400 mb-1">GitHub</p>
        <p class="text-sm"
          [class]="theme.isDark() ? 'text-gray-400' : 'text-gray-500'">
          /ELOI-CODE1
        </p>
      </div>
    </div>

    <!-- CTA Button -->
    <a href="mailto:your@email.com"
      class="inline-block px-12 py-4 bg-cyan-400 text-black font-black tracking-widest uppercase text-sm hover:bg-cyan-300 transition-all duration-300">
      Say Hello →
    </a>

  </div>

  <!-- Footer -->
  <div class="text-center mt-24">
    <p class="text-xs tracking-widest uppercase"
      [class]="theme.isDark() ? 'text-gray-600' : 'text-gray-400'">
      Built with Angular & Tailwind CSS — {{ year }}
    </p>
  </div>

</section>
