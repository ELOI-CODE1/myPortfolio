<section id="contact" class="relative py-32 px-8 bg-gray-950 text-white overflow-hidden">

  <!-- subtle glow -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-96 h-96 rounded-full blur-3xl opacity-10 bg-cyan-500"></div>

  <div class="relative max-w-2xl mx-auto text-center">

    <!-- Header -->
    <div appReveal>
      <p class="text-cyan-400 tracking-[0.4em] uppercase text-sm mb-4">Get In Touch</p>
      <h2 class="text-5xl font-black tracking-tighter mb-6">
        Contact <span class="text-cyan-400">Me</span>
      </h2>
      <div class="w-16 h-1 bg-cyan-400 mx-auto mb-8"></div>
      <p class="mb-12 text-gray-400 leading-relaxed">
        Have a project in mind, a role to fill, or just want to say hi? <br>
        I'm always open to new ideas, collaborations, and opportunities — my inbox is open!
      </p>
    </div>

    <!-- Contact cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-12">
      <div [appReveal]="0"
        class="p-6 border border-gray-700 bg-gray-800 hover:border-cyan-400 hover:-translate-y-1 transition-all duration-300">
        <img src="/images/gmail.png" alt="Email" class="w-10 h-10 mb-2 mx-auto">
        <p class="text-xs tracking-widest uppercase text-cyan-400 mb-1">Email</p>
        <a href="mailto:izabayoeloi2@gmail.com"
          class="text-sm text-gray-400 hover:text-cyan-400 transition-colors break-all">
          izabayoeloi2&#64;gmail.com
        </a>
      </div>

      <div [appReveal]="100"
        class="p-6 border border-gray-700 bg-gray-800 hover:border-cyan-400 hover:-translate-y-1 transition-all duration-300">
        <img src="/images/linkedin.png" alt="LinkedIn" class="w-10 h-10 mb-2 mx-auto">
        <p class="text-xs tracking-widest uppercase text-cyan-400 mb-1">LinkedIn</p>
        <a href="https://www.linkedin.com/in/eloi-izabayo/" target="_blank" rel="noopener"
          class="text-sm text-gray-400 hover:text-cyan-400 transition-colors">
          eloi-izabayo
        </a>
      </div>

      <div [appReveal]="200" class="p-6 border border-gray-700 bg-gray-800 hover:border-cyan-400 hover:-translate-y-1 transition-all duration-300">
        <img src="/images/github.png" alt="GitHub" class="w-10 h-10 mb-2 mx-auto">
        <p class="text-xs tracking-widest uppercase text-cyan-400 mb-1">GitHub</p>
        <a href="https://github.com/ELOI-CODE1" target="_blank" rel="noopener"
          class="text-sm text-gray-400 hover:text-cyan-400 transition-colors">
          /ELOI-CODE1
        </a>
      </div>
    </div>

    <!-- CTA Button -->
    <a href="https://wa.me/250798252250" target="_blank" rel="noopener" appReveal
      class="inline-block px-12 py-4 bg-cyan-400 text-black font-black tracking-widest uppercase text-sm hover:bg-cyan-300 hover:-translate-y-0.5 hover:shadow-[0_0_25px_rgba(0,255,255,0.5)] transition-all duration-300">
      Say Hello →
    </a>

    <!-- Footer -->
    <p class="mt-20 text-xs tracking-widest uppercase text-gray-600">
      © {{ year }} IZABAYO Eloi 
    </p>
  </div>
</section>
