<section id="skills" class="py-32 px-8 transition-colors duration-300"
  [class]="theme.isDark() ? 'bg-gray-950 text-white' : 'bg-white text-gray-900'">

  <div class="max-w-4xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-16">
      <p class="text-cyan-400 tracking-[0.4em] uppercase text-sm mb-4">What I Know</p>
      <h2 class="text-5xl font-black tracking-tighter">
        My <span class="text-cyan-400">Skills</span>
      </h2>
      <div class="w-16 h-1 bg-cyan-400 mx-auto mt-6"></div>
    </div>

    <!-- Skills list -->
    <div class="flex flex-col gap-8">
      @for (skill of skills; track skill.name) {
        <div>
          <div class="flex justify-between items-center mb-2">
            <span class="text-lg font-bold tracking-wider">
              {{ skill.icon }} {{ skill.name }}
            </span>
            <span class="text-cyan-400 font-black text-sm tracking-widest">
              {{ skill.level }}%
            </span>
          </div>
          <!-- Track bar -->
          <div class="w-full h-2 rounded-full"
            [class]="theme.isDark() ? 'bg-gray-800' : 'bg-gray-200'">
            <div class="h-2 rounded-full bg-cyan-400 transition-all duration-1000"
              [style.width.%]="skill.level">
            </div>
          </div>
        </div>
      }
    </div>

  </div>
</section>
