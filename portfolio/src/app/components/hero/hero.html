<section class="min-h-screen flex items-center justify-center relative overflow-hidden"
  [class]="theme.isDark() ? 'bg-gray-950 text-white' : 'bg-white text-gray-900'">

  <div class="absolute inset-0 bg-[linear-gradient(rgba(0,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(0,255,255,0.03)_1px,transparent_1px)] bg-[size:50px_50px]"></div>

  <div class="absolute w-96 h-96 rounded-full blur-3xl opacity-20 bg-cyan-500 top-1/4 left-1/2 -translate-x-1/2"></div>

  <div class="relative z-10 text-center px-8">
    <p class="text-cyan-400 tracking-[0.4em] uppercase text-sm mb-4">Hello, World 👋</p>
    <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-6">
      Your <span class="text-cyan-400">Name</span>
    </h1>
    <p class="text-xl md:text-2xl tracking-widest uppercase mb-4"
       [class]="theme.isDark() ? 'text-gray-400' : 'text-gray-600'">
      Full Stack Developer
    </p>
    <p class="max-w-xl mx-auto mb-10"
       [class]="theme.isDark() ? 'text-gray-500' : 'text-gray-500'">
       I build fast, modern, and beautiful web applications with a passion for clean code and great user experiences.
    </p>
    <div class="flex gap-4 justify-center">
      <a href="#projects"
        class="px-8 py-3 bg-cyan-400 text-black font-bold tracking-widest uppercase text-sm hover:bg-cyan-300 transition-all">
        View Projects
      </a>
      <a href="#contact"
        [class]="theme.isDark() ? 'border-gray-600 text-gray-300 hover:border-cyan-400 hover:text-cyan-400' : 'border-gray-400 text-gray-600 hover:border-cyan-500 hover:text-cyan-500'"
        class="px-8 py-3 border tracking-widest uppercase text-sm transition-all">
        Contact Me
      </a>
    </div>
  </div>
</section>
