<nav class="fixed top-0 w-full z-50 backdrop-blur-md border-b px-8 py-4 flex justify-between items-center"
     [class]="theme.isDark() ? 'bg-gray-950/80 border-gray-800 text-white' : 'bg-white/80 border-gray-200 text-gray-900'">
  
  <span class="text-xl font-bold tracking-widest uppercase">
    &lt;IZABAYO Eloi/&gt;
  </span>

  <div class="flex gap-8 items-center text-sm tracking-wider uppercase">
    <a href="#about" class="hover:text-cyan-400 transition-colors">About</a>
    <a href="#skills" class="hover:text-cyan-400 transition-colors">Skills</a>
    <a href="#projects" class="hover:text-cyan-400 transition-colors">Projects</a>
    <a href="#contact" class="hover:text-cyan-400 transition-colors">Contact</a>

    <button (click)="toggleTheme()"
      class="ml-4 px-3 py-1 rounded-full border text-xs tracking-widest uppercase transition-all"
      [class]="theme.isDark() ? 'border-cyan-400 text-cyan-400 hover:bg-cyan-400 hover:text-black' : 'border-gray-800 text-gray-800 hover:bg-gray-800 hover:text-white'">
      {{ theme.isDark() ? '☀ Light' : '🌙 Dark' }}
    </button>
  </div>
</nav>
